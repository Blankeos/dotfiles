procs:
  uv:
    shell: uv self update
  opencode:
    shell: brew upgrade anomalyco/tap/opencode
  grok:
    shell: grok update
  rustup:
    shell: rustup upgrade
  bun:
    shell: bun upgrade
  claude:
    shell: claude upgrade
  codex:
    shell: brew upgrade --cask codex
  lazygit:
    shell: brew upgrade lazygit
  ohmyzsh:
    shell: zsh -ic 'omz update'
  # My Tools
  lazygitrs:
    shell: cargo binstall --no-confirm lazygitrs
  iconmate:
    shell: cargo binstall --no-confirm iconmate
  crabcode:
    shell: cargo binstall --no-confirm crabcode
  devrefs:
    shell: cargo binstall --no-confirm devrefs
  cftun:
    shell: cargo binstall --no-confirm cftun
