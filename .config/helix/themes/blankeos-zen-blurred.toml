# Blankeos Zen (blurred) — transparent UI; pair with a transparent terminal.

inherits = "blankeos-zen"

"ui.background" = { fg = "foreground" }
"ui.statusline" = { fg = "foreground" }
"ui.statusline.inactive" = { fg = "muted" }
"ui.popup" = { fg = "foreground" }
"ui.menu" = { fg = "foreground" }
"ui.help" = { fg = "foreground" }

"ui.bufferline.background" = { bg = "active-line" }
"ui.bufferline" = { fg = "muted", bg = "active-line" }
"ui.bufferline.active" = { fg = "foreground-bright", bg = "selection-primary", underline = { color = "accent", style = "line" } }